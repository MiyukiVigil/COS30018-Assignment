# Runtime defaults for the broker-routed car trading platform.
# Values can be changed before launch; UI fields can still override strategy values per run.

broker.fixedFee=50.0
broker.commissionRate=0.05
broker.sessionTimeoutMillis=120000
broker.timeoutScanMillis=5000

strategy.initial=BOULWARE
strategy.switch=CONCEDER
strategy.switchCycle=15
strategy.deadlineCycles=50
strategy.buyerStartPercent=0.70
strategy.dealerReservePercent=0.70
strategy.maxRoundsPerDealer=3
strategy.maxSearchRetries=2
strategy.stuckRoundsBeforeAcceleration=2
strategy.manualDealerTargetPercent=1.0

utility.priceWeight=0.70
utility.warrantyWeight=0.20
utility.deliveryWeight=0.10
utility.defaultWarrantyMonths=12
utility.defaultDeliveryDays=14
